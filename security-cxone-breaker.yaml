parameters:
  - name: cx_client_id
    type: string
  - name: cx_secret
    type: string
  - name: branch
    type: string
  - name: condition
    type: string
    default: 'succeeded()'
  - name: MS_NAME 
    type: string
    default: ''
  - name: continue_on_error
    type: boolean
    default: false


steps:
  - task: Bash@3
    displayName: 'Breaker - CxOne'
    condition: ${{ parameters.condition }}
    continueOnError: ${{ parameters.continue_on_error }}
    inputs:
      targetType: 'inline'
      script: |
        # -- Variables de entorno
        PROJECT_NAME="${PROJECT_NAME_ENV}"
        BRANCH="${BRANCH_ENV}"
        CLIENT_ID="${CX_CLIENT_ID}"
        CLIENT_SECRET="${CX_CLIENT_SECRET}"
        SCAN_ID="${SCAN_ID_ENV}"
        PROJECT_ID="${PROJECT_ID_ENV}"

        # -- Variables de control
        CXONE_TOKEN=""
        SEVERITY=("CRITICAL" "HIGH")
        SEVERITY_STR="CRITICAL,HIGH"
        CX_URL_AST="https://ast.checkmarx.net/api"
        BASELINE_ID=""

        # -- Control de fallos
        SAST_FAILED=false
        SCA_FAILED=false
        SAST_CRIT=0
        SAST_HIGH=0
        SCA_CRIT=0
        SCA_HIGH=0

        # --
        # -- Modulos y Funciones
        # --
        # -- Validar identificadores
        validate_identifiers() {
          echo "[INFO] Identificadores recibidos:"
          echo " - ProjectName: ${PROJECT_NAME}"
          echo " - ScanId: ${SCAN_ID}"
          echo " - ClientId: $( [ -n "$CLIENT_ID" ] && echo 'Configurado' || echo 'FALTANTE' )"

          if [ -z "${PROJECT_NAME}" ] || [ "${PROJECT_NAME}" == "null" ]; then
            echo "##vso[task.logissue type=error] Error: Project Name es nulo o no está definido."
            exit 1
          fi
          if [ -z "${SCAN_ID}" ] || [ "${SCAN_ID}" == "null" ]; then
            echo "##vso[task.logissue type=error] Error: Scan Id es nulo o no está definido."
            exit 1
          fi
          if [ -z "${CLIENT_ID}" ] || [ "${CLIENT_ID}" == "null" ]; then
            echo "##vso[task.logissue type=error] Error: Client Id es nulo o no está definido."
            exit 1
          fi
        }
        
        # -- Obtener token IAM
        get_token_iam() {
          echo "[INFO] Solicitando Token IAM API CxOne..."
          local auth_url="https://iam.checkmarx.net/auth/realms/coppel/protocol/openid-connect/token"
          local post_body="client_id=${CLIENT_ID}&grant_type=client_credentials&client_secret=${CLIENT_SECRET}"

          local response=$(curl -s -w "\n%{http_code}" -X POST "$auth_url" \
              -H "Content-type: application/x-www-form-urlencoded" \
              -H "Accept: application/json" \
              -d "$post_body")
          
          local http_code=$(echo "$response" | tail -n1)
          local body=$(echo "$response" | sed '$d')

          if [ "$http_code" -eq 200 ]; then
            CXONE_TOKEN=$(echo "$body" | jq -r '.access_token')
            if [ -z "$CXONE_TOKEN" ] || [ "$CXONE_TOKEN" == "null" ]; then
              echo "##vso[task.logissue type=error] Error: Token extraído es nulo."
              exit 1
            fi
            echo "[OK] Token obtenido exitosamente."
          else
            echo "##vso[task.logissue type=error] Error Token IAM: Código ${http_code}"
            echo "Detalle: ${body}"
            exit 1
          fi
        }
       
        # -- Obtener PROJECT_ID
        get_projectID() {
          echo "[INFO] Buscando ProjectID API CxOne..."

          local project_name_encoded=$(jq -rn --arg x "$PROJECT_NAME" '$x|@uri')
          local search_url="${CX_URL_AST}/projects?name=${project_name_encoded}"

          local response=$(curl -s -w "\n%{http_code}" -X GET "$search_url" \
              -H "Authorization: Bearer ${CXONE_TOKEN}" \
              -H "Accept: application/json")
          
          local http_code=$(echo "$response" | tail -n1)
          local body=$(echo "$response" | sed '$d')

          if [ "$http_code" -eq 200 ]; then
            PROJECT_ID=$(echo "$body" | jq -r --arg name "$PROJECT_NAME" '
              (if type == "object" and .projects then .projects else . end)
              | map(select(.name == $name))
              | .[0].id 
            ')
            if [ -n "$PROJECT_ID" ]; then
                echo "[OK] ProjectID: ${PROJECT_ID}"
            else
                echo "##vso[task.logissue type=error]: No existe el proyecto '${PROJECT_NAME}'."
                exit 1
            fi
          else
            echo "##vso[task.logissue type=error] Error API CxOne Projects: Codigo ${http_code}"
            echo "Detalle: ${body}"
            exit 1
          fi 
        }

        # -- Peticion Generica a la API
        make_api_request() {
          local url="$1"
          local method="$2"
          local body="$3"
          local extra_args=()

          if [ -n "$body" ]; then
            extra_args=(-H "Content-type: application/json" -d "$body")
          fi 

          local response=$(curl -s -w "\n%{http_code}" -X "$method" "$url" \
              -H "Authorization: Bearer ${CXONE_TOKEN}" \
              -H "Accept: application/json; version=1.0" \
              "${extra_args[@]}")
          
          API_STATUS=$(echo "$response" | tail -n1)
          API_BODY=$(echo "$response" | sed '$d')

          if [ "$API_STATUS" -ge 200 ] && [ "$API_STATUS" -lt 400 ]; then
              return 0
          else
              return 1
          fi
        }

        # -- Validar estado del escaneo
        check_scan_status() {
          echo "[INFO] Verificando el estado del escaneo: ${SCAN_ID}..."
          local url="${CX_URL_AST}/scans/${SCAN_ID}"

          make_api_request "$url" "GET"

          if [ "$API_STATUS" -eq 200 ]; then
            local status=$(echo "$API_BODY" | jq -r '.status')
            echo "[INFO] Estado reportado por API CxOne: ${status}"
            if [ "$status" != "Completed" ] && [ "$status" != "Partial" ]; then
              echo "##vso[task.logissue type=error] Error Fatal: El escaneo falló internamente en la plataforma. Estado actual: ${status}"
              exit 1
            fi 
          else
            echo "##vso[task.logissue type=error] Error API Check Scan Status: Código ${API_STATUS}"
            exit 1
          fi 
        }

        # -- Validacion directa SAST (sin linea base)
        sast_direct_validation() {
          echo "[INFO] Iniciando validación SAST directa (Sin Línea Base)..."
          sleep 5

          local sast_json_path="${AGENT_TEMPDIRECTORY:-.}/cxone_sast_direct.json"
          rm -f "$sast_json_path"

          for sev in "${SEVERITY[@]}"; do 
            if [ "$SAST_FAILED" = true ]; then break; fi 

            local queryString="?scan-id=${SCAN_ID}&severity=${sev}&group-by-field=STATE"
            local url="${CX_URL_AST}/sast-scan-summary/aggregate${queryString}"
            make_api_request "$url" "GET"

            if [ "$API_STATUS" -ne 200 ]; then
              echo "##vso[task.logissue type=error] Error API SAST Aggregate (${sev}): Código ${API_STATUS}"
              SAST_FAILED=true
              break
            fi 

          local active=$(echo "$API_BODY" | jq -r '
            if .summaries then
              [.summaries[] 
                | select((.state | ascii_downcase) != "not_exploitable") 
                | .count
              ] | add // 0
            else 0 end
          ')

            if [ "$sev" == "CRITICAL" ]; then SAST_CRIT=$active; fi 
            if [ "$sev" == "HIGH" ]; then SAST_HIGH=$active; fi 

            echo "$API_BODY" >> "$sast_json_path"
          done

          echo "##vso[task.setvariable variable=CX_SAST_JSON_PATH]$sast_json_path"

          echo "[INFO] RESULTADO SAST (Análisis Directo):"
          echo " - CRITICAL (Activas) : ${SAST_CRIT}"
          echo " - HIGH     (Activas) : ${SAST_HIGH}"

          if [ "$SAST_CRIT" -gt 0 ] || [ "$SAST_HIGH" -gt 0 ] || [ "$SAST_FAILED" = true ]; then
            echo "[!] Se detectaron vulnerabilidades activas"
            SAST_FAILED=true
            make_api_request "${CX_URL_AST}/scans/${SCAN_ID}/tags" "PUT" '{"tags":{"Break SAST Fallo":""}}'
          else
            echo "[OK] SAST Aprobado. Cero riesgos activos."
            make_api_request "${CX_URL_AST}/scans/${SCAN_ID}/tags" "PUT" '{"tags":{"Break SAST OK":""}}'
          fi
        }

        # -- Validacion Diferencial SAST (Con linea base)
        sast_comparative_validation() {
          echo "[INFO] Iniciando validación SAST comparativa (Contra línea base: ${BASELINE_ID})..."
          sleep 5

          local queryString="?base-scan-id=${BASELINE_ID}&scan-id=${SCAN_ID}&severity=${SEVERITY_STR}&status=NEW,RECURRENT&limit=5000"
          local url="${CX_URL_AST}/sast-results/compare${queryString}"
          make_api_request "$url" "GET"

          if [ "$API_STATUS" -ne 200 ]; then
            echo "##vso[task.logissue type=error] Error API SAST Comparativa: Código ${API_STATUS}"
            echo "Detalle: ${API_BODY}"
            SAST_FAILED=true
            return
          fi 

          local sast_json_path="${AGENT_TEMPDIRECTORY:-.}/cxone_sast_compare.json"
          echo "$API_BODY" > "$sast_json_path"
          echo "##vso[task.setvariable variable=CX_SAST_JSON_PATH]$sast_json_path" 

          for sev in "${SEVERITY[@]}"; do
            local count=$(echo "$API_BODY" | jq -r --arg s "$sev" '
            if .results then
              [.results[] | select(.status == "NEW" and (.state | gsub("_";"") | ascii_downcase) != "notexploitable" and .severity == $s)] | length
            else 0 end')

            if [ "$sev" == "CRITICAL" ]; then
              SAST_CRIT=$count
              echo " - Nuevas CRITICAL (Activas) : ${SAST_CRIT}"
            elif [ "$sev" == "HIGH" ]; then
              SAST_HIGH=$count
              echo " - Nuevas HIGH (Activas)     : ${SAST_HIGH}"
            fi
          done

          if [ "$SAST_CRIT" -gt 0 ] || [ "$SAST_HIGH" -gt 0 ] || [ "$SAST_FAILED" = true ]; then
            echo "[!] Se detectaron vulnerabilidades NUEVAS respecto a la línea base."
            SAST_FAILED=true
            make_api_request "${CX_URL_AST}/scans/${SCAN_ID}/tags" "PUT" '{"tags":{"Break SAST Fallo":""}}'
          else
            echo "[OK] SAST Aprobado. Cero riesgos activos."
            make_api_request "${CX_URL_AST}/scans/${SCAN_ID}/tags" "PUT" '{"tags":{"Break SAST OK":""}}'
          fi
        }

        # -- Selector evaluacion general SAST (Obtener linea base)
        sast_baseline_evaluation() {
          echo "##[group] Evaluación SAST" 
          echo "[INFO] Buscando escaneo previo (Línea base) en ramas main/master..."

          local branches=("main" "master")
          local baseline=false

          for branch in "${branches[@]}"; do 
            if [ "$baseline" = true ]; then break; fi 
            echo " Buscando escaneo exitoso en rama: ${branch}..."

            local queryString="?offset=0&limit=1&project-id=${PROJECT_ID}&branch=${branch}&statuses=Completed&sort=-created_at&tags-keys=Break%20SAST%20OK"
            local url="${CX_URL_AST}/scans${queryString}"
            make_api_request "$url" "GET"

            if [ "$API_STATUS" -eq 200 ]; then
              local baseline_id=$(echo "$API_BODY" | jq -r '.scans[0].id // empty')
              if [ -n "$baseline_id" ] && [ "$baseline_id" != "null" ]; then
                BASELINE_ID="$baseline_id"
                baseline=true
                echo "[OK] Línea base detectada: [ID: ${BASELINE_ID}] en rama [${branch}]."
              fi 
            fi 
          done

          if [ "$baseline" = true ]; then
            echo "[INFO] Ejecutando comparación diferencial"
            sast_comparative_validation
          else
            echo "[INFO] Ejecutando validación directa (No se encontro linea base)"
            sast_direct_validation
          fi 
          echo "##[endgroup]"
        }

        # -- Exportacion y Evaluacion SCA 
        sca_evaluation() {
          echo "##[group] Exportación y Evaluación SCA" 
          echo "[INFO] Solicitando exportacion SCA a la API CxOne..."

          local body="{\"scanId\":\"${SCAN_ID}\",\"fileFormat\":\"ScanReportJson\",\"exportParameters\":{\"hideDevAndTestDependencies\":false,\"showOnlyEffectiveLicenses\":false}}"
          make_api_request "${CX_URL_AST}/sca/export/requests" "POST" "$body"

          if [ "$API_STATUS" -lt 200 ] || [ "$API_STATUS" -gt 299 ]; then
            echo "##vso[task.logissue type=error] Error: Fallo al solicitar exportación SCA. Código: $API_STATUS"
            SCA_FAILED=true
            return
          fi 

          local export_id=$(echo "$API_BODY" | jq -r '.exportId')
          echo "[INFO] ID scaneo SCA: ${export_id}, esperando procesamiento..."

          local max_retries=${SCA_MAXRETRIES:-30}
          local retries=0
          local export_status=""

          while [ "$retries" -lt "$max_retries" ]; do 
            make_api_request "${CX_URL_AST}/sca/export/requests?exportId=${export_id}" "GET"
            export_status=$(echo "$API_BODY" | jq -r '.exportStatus')
          
            echo " >> Estado: ${export_status} (Solicitud $((retries + 1)))"

            if [ "$export_status" == "Completed" ]; then
              echo "[OK] Reporte CSA generado exitosamente."
              break
            fi 
            if [ "$export_status" == "Failed" ] || [ "$export_status" == "Canceled" ]; then
              echo "##vso[task.logissue type=error] Error: La exportacion del reporte CSA fallo (${export_status})"
              SCA_FAILED=true
              return
            fi 
            retries=$((retries + 1))
            sleep 10
          done

          if [ "$export_status" != "Completed" ]; then
            echo "##vso[task.logissue type=error] Timeout esperando resporte SCA"
            SCA_FAILED=true
            return
          fi 

          # -- Descarga y evaluacion
          echo "[INFO] Aplicando reglas de negocio..."
          make_api_request "${CX_URL_AST}/sca/export/requests/${export_id}/download" "GET"

          if [ "$API_STATUS" -ne 200 ]; then
            echo "##vso[task.logissue type=error] Error: Fallo al descargar reporte SCA. Codigo: ${API_STATUS}"
            SCA_FAILED=true
            return
          fi 

          local sca_json_path="${AGENT_TEMPDIRECTORY:-.}/cxone_sca_breaker.json"
          echo "$API_BODY" > "$sca_json_path"
          echo "##vso[task.setvariable variable=CX_SCA_JSON_PATH]$sca_json_path"
          
          # -- Reglas de negocio SCA
          local violations=$(echo "$API_BODY" | jq -r '
            (reduce .Packages[] as $p ({}; .[$p.Id] = $p)) as $pkgs |
            [
              .Vulnerabilities[] |
              . as $v |
              $pkgs[$v.PackageId] as $p |
              select(($v.RiskState == null) or (($v.RiskState | type == "string") and ($v.RiskState | gsub("_";"") | ascii_downcase) != "notexploitable")) |
              (
                [
                  (if ($p.IsMalicius == true) then "Malware" else empty end),
                  (if ($p.IsDevelopmentDependency != true and $p.IsTestDependency != true) then
                    (if ($v.Kev == true) then "KEV" else empty end),
                    (if ($v.ExploitablePath == true) then "Ruta Explotable" else empty end),
                    (if ($v.Poc == true) then "PoC Pública" else empty end), 
                    (if (($v.Severity == "CRITICAL" or $v.Severity == "HIGH") and (($v.EpssValue // 0 | tonumber) >= 0.10) and $p.IsDirectDependency == true) then "EPSS >= 10% (Directa)" else empty end)
                  else empty end)
                ] | select(length > 0) | join(" + ")
              ) as $reason |
              select($reason != null and $reason != "") |
              {
                PackageId: $p.Id,
                VulnId: $v.Id,
                Severity: ($v.Severity | ascii_upcase),
                Epss: (if $v.EpssValue != null then ((($v.EpssValue | tonumber) * 10000 | round)/100) else 0 end),
                IsDirect: ($p.IsDirectDependency // false),
                IsDev: ($p.IsDevelopmentDependency // false),
                IsMalicious: ($p.IsMalicious // false),
                Kev: ($v.Kev // false),
                Poc: ($v.Poc // false),
                RiskState: ($v.RiskState // "N/A"),
                ExplPath: ($v.ExploitablePath // false),
                Reason: $reason
              }
            ] | unique | sort_by(.Severity, .PackageId)
          ')

          local is_empty=$(echo "$violations" | jq 'length == 0')
          
          if [ "$is_empty" == "true" ]; then
            echo "[OK] SCA Aprobado. Las vulnerabilidades encontradas no superan los umbrales de riesgo."
          else
            SCA_FAILED=true
            
            SCA_CRIT=$(echo "$violations" | jq '[.[] | select(.Severity == "CRITICAL")] | length')
            SCA_HIGH=$(echo "$violations" | jq '[.[] | select(.Severity == "HIGH")] | length')
            local fail_pkg_count=$(echo "$violations" | jq '[.[].PackageId] | unique | length')
            
            echo "[INFO] RESULTADO SCA (Filtro de Inteligencia de Amenazas)"
            echo "  - Paquetes Bloqueados : ${fail_pkg_count}"
            echo "  - Hallazgos CRITICAL  : ${SCA_CRIT}"
            echo "  - Hallazgos HIGH      : ${SCA_HIGH}"
            echo ""

            # --- Generar Tabla ASCII 
            echo " REPORTE GLOBAL DE HALLAZGOS SCA (${fail_pkg_count} Paquetes Bloqueados)"
            echo "+----------------------------------------+-----------------+-------+---------+--------+-------+--------+-------+----------+--------+--------+---------------------------------+"
            printf "| %-38s | %-15s | %-5s | %-7s | %-6s | %-5s | %-6s | %-5s | %-8s | %-6s | %-6s | %-31s |\n" "Package ID" "Vuln ID" "Malic" "RiskSt" "DevTst" "KEV" "ExPath" "PoC" "Severity" "EPSS" "Direct" "Razón del Fallo"
            echo "+----------------------------------------+-----------------+-------+---------+--------+-------+--------+-------+----------+--------+--------+---------------------------------+"
            
            echo "$violations" | jq -r '.[] | [ .PackageId[0:38], .VulnId, (.IsMalicious | tostring), (.RiskState[0:7]), (.IsDev | tostring), (.Kev | tostring), (.ExplPath | tostring), (.Poc | tostring), .Severity, "\(.Epss)%", (.IsDirect | tostring), .Reason[0:31] ] | @tsv' | while IFS=$'\t' read -r pkg vuln mal risk dev kev expl poc sev epss dir reason; do
              printf "| %-38s | %-15s | %-5s | %-7s | %-6s | %-5s | %-6s | %-5s | %-8s | %-6s | %-6s | %-31s |\n" "$pkg" "$vuln" "$mal" "$risk" "$dev" "$kev" "$expl" "$poc" "$sev" "$epss" "$dir" "$reason"
            done
            
            echo "+----------------------------------------+-----------------+-------+---------+--------+-------+--------+-------+----------+--------+--------+---------------------------------+"
            echo "##vso[task.logissue type=error] Alerta de seguridad SCA: Revisa la tabla superior para ver las vulnerabilidades activas."
          fi
          echo "##[endgroup]"
        }

        # -- Resumen Final y Decisión Pipeline
        final_summary() {
          local sast_status=" PASO"
          local sca_status=" PASO"
          if [ "$SAST_FAILED" = true ]; then sast_status=" FALLO"; fi
          if [ "$SCA_FAILED" = true ]; then sca_status=" FALLO"; fi
          
          local sast_info="Linea Base: ${BASELINE_ID:-N/A (Scan Directo)}"
          local sca_info="Politicas cumplidas"
          if [ "$SCA_FAILED" = true ]; then sca_info="Revisar tabla detallada arriba"; fi

          echo "-------------------------------------------------------------------------------------------------"
          echo "|                          REPORTE FINAL DE CUMPLIMIENTO DE SEGURIDAD                           |"
          echo "+----------+------------+----------+----------+-------------------------------------------------+"
          printf "| %-8s | %-10s | %-8s | %-8s | %-47s |\n" "MODULO" "ESTADO" "CRITICAS" "ALTAS" "INFO ADICIONAL"
          echo "+----------+------------+----------+----------+-------------------------------------------------+"
          printf "| %-8s | %-10s | %-8s | %-8s | %-47s |\n" "SAST" "$sast_status" "$SAST_CRIT" "$SAST_HIGH" "$sast_info"
          printf "| %-8s | %-10s | %-8s | %-8s | %-47s |\n" "SCA" "$sca_status" "$SCA_CRIT" "$SCA_HIGH" "$sca_info"
          echo "+----------+------------+----------+----------+-------------------------------------------------+"
          if [ "$SAST_FAILED" = true ] || [ "$SCA_FAILED" = true ]; then
            echo ""
            echo "##vso[task.logissue type=error] FALLO DE SEGURIDAD: Revisa los hallazgos críticos/altos."
            exit 1
          fi
          
          echo ""
          echo " Seguridad aprobada: Cumplimiento total de políticas."
          echo "====================================================================================="
        }

        # -- main
        main() {
            echo "##[group] Preparación y Autenticación"

            validate_identifiers
            get_token_iam
            if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" == "null" ]; then
                get_projectID
            fi
            check_scan_status
            echo "##[endgroup]"

            sast_baseline_evaluation

            sca_evaluation

            final_summary
        }
        main

    env:
      BRANCH_ENV: ${{ parameters.branch }}
      CX_CLIENT_ID: ${{ parameters.cx_client_id }}
      CX_CLIENT_SECRET: ${{ parameters.cx_secret }}
      SCAN_ID_ENV: $(ScanID)
      PROJECT_ID_ENV: $(ProjectID)
      PROJECT_NAME_ENV: $(CX_PROJECT_NAME)

